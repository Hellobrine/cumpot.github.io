<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="CumpotVPN - Fast. Private. Simple. Your gateway to a free internet.">
    <meta name="theme-color" content="#0f0f0f">
    <title>CumpotVPN</title>
    <style>
        /* CSS Reset & Base Styles */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --accent-blue: #0088ff;
            --accent-teal: #00d4aa;
            --accent-yellow: #ffd700; /* Gold/Yellow to match emoji */
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --border-color: rgba(255, 255, 255, 0.1);
            --glow-blue: rgba(0, 136, 255, 0.4);
            --glow-teal: rgba(0, 212, 170, 0.4);
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(0, 136, 255, 0.03) 0%, transparent 70%),
                        radial-gradient(ellipse at 20% 80%, rgba(0, 212, 170, 0.02) 0%, transparent 50%);
            animation: gradientShift 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Grid Background Pattern */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse at center, black 0%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 75%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* Main Container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Logo Section */
        .logo-container {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            font-size: 4rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(0, 136, 255, 0.2));
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-top: 0.75rem;
        }

        .brand-vpn {
            color: var(--accent-yellow);
        }

        /* Tagline Styles */
        .tagline {
            font-size: 1rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0.8;
            font-weight: 400;
            letter-spacing: 0.02em;
            animation: fadeIn 0.8s ease-out 0.2s both;
            max-width: 400px;
            line-height: 1.5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Button Container */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 320px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        /* Button Styles */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            color: var(--accent-blue);
            border-color: rgba(0, 136, 255, 0.3);
        }

        .btn-primary:hover {
            background: rgba(0, 136, 255, 0.1);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--glow-blue);
        }

        .btn-secondary {
            color: var(--accent-teal);
            border-color: rgba(0, 212, 170, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 170, 0.1);
            border-color: var(--accent-teal);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--glow-teal);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn:focus-visible {
            outline: 2px solid currentColor;
            outline-offset: 2px;
        }

        /* Footer */
        .footer {
            padding: 1.5rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .footer-text:hover {
            opacity: 1;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            
            .logo {
                animation: none;
            }
            
            body::before {
                animation: none;
            }
        }

        /* Desktop Styles */
        @media (min-width: 768px) {
            .logo {
                font-size: 5rem;
            }

            .brand-name {
                font-size: 1.25rem;
            }

            .brand-name {
                font-size: 1.25rem;
            }

            .button-container {
                flex-direction: row;
                justify-content: center;
                max-width: 600px;
            }

            .btn {
                min-width: 200px;
            }
        }

        /* Large Desktop */
        @media (min-width: 1024px) {
            .logo {
                font-size: 6rem;
            }

            .brand-name {
                font-size: 2.5rem;
            }
        }

        /* Mobile Optimizations */
        @media (max-width: 375px) {
            .logo {
                font-size: 3.5rem;
            }

            .brand-name {
                font-size: 1.75rem;
            }

            .btn {
                padding: 0.875rem 1.5rem;
                font-size: 0.9375rem;
            }
        }
    </style>
</head>
<body>
    <main class="container" role="main">
        <!-- Logo Section -->
        <div class="logo-container">
            <span class="logo" role="img" aria-label="CumpotVPN Logo">✌️</span>
            <h1 class="brand-name">Cumpot<span class="brand-vpn">VPN</span></h1>
        </div>

        <!-- Tagline -->
        <p class="tagline" id="tagline"></p>

        <!-- CTA Buttons -->
        <div class="button-container">
            <a 
                href="tg://proxy?add=YOUR_PROXY_HERE" 
                class="btn btn-primary"
                aria-label="Connect via Telegram Proxy"
                rel="noopener"
            >
                Бесплатный прокси
            </a>
            <a 
                href="tg://resolve?domain=cumpotvpn_bot" 
                class="btn btn-secondary"
                aria-label="Open CumpotVPN Bot on Telegram"
            >
                Подключить
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">Подключайся уже сейчас</p>
    </footer>

    <script>
        // Random tagline selector
        const taglines = [
            "Интернет без границ",
            "Свобода начинается здесь"
        ];

        // Smooth focus management for accessibility
        document.addEventListener('DOMContentLoaded', function() {
            // Set random tagline
            const taglineElement = document.getElementById('tagline');
            if (taglineElement) {
                const randomTagline = taglines[Math.floor(Math.random() * taglines.length)];
                taglineElement.textContent = randomTagline;
            }

            const buttons = document.querySelectorAll('.btn');
            
            buttons.forEach(btn => {
                btn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        btn.classList.add('pressed');
                    }
                });
                
                btn.addEventListener('keyup', () => {
                    btn.classList.remove('pressed');
                });
                
                btn.addEventListener('blur', () => {
                    btn.classList.remove('pressed');
                });
            });

            // Add loaded class for potential JS-triggered animations
            document.body.classList.add('loaded');
        });
    </script>
</body>
</html>
